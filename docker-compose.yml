version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: sensor-integrator-db
    environment:
      POSTGRES_USER: integrator
      POSTGRES_PASSWORD: integrator123
      POSTGRES_DB: sensor_data_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrator -d sensor_data_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sensor-integrator-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: integrator
      DB_PASSWORD: integrator123
      DB_NAME_SENSOR_SUBSEA_DEV: sensor_data_dev
      DB_NAME_SENSOR_SUBSTATION_DEV: sensor_data_dev
      WAREHOUSE_URL_DEV: http://localhost:8096
      TEMP_DIR: /tmp/integrator_uploads
      MAX_UPLOAD_SIZE_MB: 200
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: